<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Leave a Review • Triana</title>

<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

<style>

:root{
--brand:#2d4b2f;
--brand2:#7a8a56;
--bg:#fbfbf7;
--card:#ffffff;
--radius:18px;
}

body{
margin:0;
font-family:"Libre Baskerville", serif;
background:var(--bg);
color:#1f2a1f;
}

.navbar{
background:#546846;
height:64px;
display:flex;
align-items:center;
padding:0 20px;
}

.brandlogo{
height:36px;
}

.wrap{
max-width:1000px;
margin:auto;
padding:40px 20px;
text-align:center;
}

h1{
font-family:"Playfair Display",serif;
font-size:42px;
margin-bottom:10px;
}

.sub{
color:#666;
max-width:650px;
margin:auto;
}

.prompt{
margin-top:30px;
background:#fff;
padding:18px;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.question{
font-size:20px;
margin-top:20px;
font-weight:bold;
}

.cta{
margin-top:25px;
display:flex;
gap:15px;
justify-content:center;
flex-wrap:wrap;
}

.btn{
padding:14px 24px;
border-radius:999px;
font-weight:bold;
text-decoration:none;
color:white;
display:inline-flex;
align-items:center;
gap:10px;
}

.google{
background:#4285F4;
animation:pulse 2s infinite;
}

.trip{
background:#00AF87;
}

.site{
background:#546846;
}

@keyframes pulse{
0%{box-shadow:0 0 0 0 rgba(66,133,244,0.6);}
70%{box-shadow:0 0 0 14px rgba(66,133,244,0);}
100%{box-shadow:0 0 0 0 rgba(66,133,244,0);}
}

.helper{
font-size:13px;
margin-top:10px;
color:#666;
}

.feedback{
margin-top:20px;
display:none;
}

textarea{
width:100%;
padding:10px;
border-radius:10px;
border:1px solid #ccc;
}

.send{
margin-top:10px;
background:#2d4b2f;
color:white;
padding:10px 20px;
border:none;
border-radius:999px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="navbar">
<a href="https://triana.ma">
<img class="brandlogo" src="logotriana@2x@2x.png">
</a>
</div>

<div class="wrap">

<h1>Share Your Experience</h1>

<p class="sub">
Your feedback helps us improve and support our small team in Chefchaouen.
</p>

<div class="prompt">

<div class="question">
Did you enjoy your experience at Triana?
</div>

<div class="cta">

<a class="btn google"
href="https://search.google.com/local/writereview?placeid=YOUR_GOOGLE_PLACE_ID"
target="_blank">
⭐ Leave a Google Review
</a>

<button class="btn site" onclick="showFeedback()">
💬 Leave Private Feedback
</button>

<a class="btn trip"
href="https://www.tripadvisor.fr/Restaurant_Review-g304013-d23583212-Reviews-Triana-Chefchaouen_Tanger_Tetouan_Al_Hoceima.html"
target="_blank">
TripAdvisor
</a>

</div>

<div class="helper">
⭐ Takes less than 30 seconds and helps us a lot.
</div>

<div class="feedback" id="feedback">

<h3>Tell us how we can improve</h3>

<textarea rows="4" placeholder="Your feedback..."></textarea>

<br>

<button class="send">Send Feedback</button>

</div>

</div>

</div>

<script>

function showFeedback(){
document.getElementById("feedback").style.display="block";
}

</script>

</body>
</html>
